pipeline_info:
  domain: "weather_external"
  subdomain: "external_api"
  version: "1.0.0"
  owner: "data-platform"
  description: "Ingesta de datos meteorológicos de API externa"

checkpoint_location: "abfss://checkpoints@stfarmia.dfs.core.windows.net/weather/external/"

source:
  type: "auto_loader"
  format: "json"
  path: "abfss://landing@stfarmia.dfs.core.windows.net/weather/external/"
  options:
    cloudFiles.format: "json"
    cloudFiles.useIncrementalListing: "true"
    cloudFiles.schemaEvolutionMode: "none"
    cloudFiles.rescuedDataColumn: "_rescued_data"
    cloudFiles.maxBytesPerTrigger: "134217728"
    cloudFiles.inferColumnTypes: "false"

schema_validation:
  schema_evolution_mode: "none"
  rescued_data_column: "_rescued_data"
  fields:
    - name: "city"
      type: "StringType"
      nullable: false
    - name: "temperature"
      type: "DoubleType"
      nullable: true
    - name: "humidity"
      type: "DoubleType"
      nullable: true
    - name: "forecast_timestamp"
      type: "TimestampType"
      nullable: false
    - name: "forecast_date"
      type: "DateType"
      nullable: false

transformations:
  pattern: "metadata_injection"
  # spark_memory_config:
  #  spark.executor.memory: "8g"
  #  spark.memory.fraction: "0.6"
  #  spark.memory.storageFraction: "0.4"
  
  metadata_injection:
    - name: "_batch_id"
      expression: "lit(batch_id)"
      datatype: "BIGINT"
    - name: "_ingest_timestamp"
      expression: "current_timestamp()"
      datatype: "TIMESTAMP"
    - name: "_event_timestamp"
      expression: "col('forecast_timestamp')"
      datatype: "TIMESTAMP"
    - name: "_schema_version_id"
      expression: "lit('1.0.0')"
      datatype: "STRING"
    - name: "_pipeline_git_hash"
      expression: "lit('placeholder_hash')"
      datatype: "STRING"
    - name: "_source_system"
      expression: "lit('weather_external')"
      datatype: "STRING"
    - name: "_file_path"
      expression: "lit('abfss://landing@stfarmia.dfs.core.windows.net/weather/external/')"
      datatype: "STRING"
    - name: "_execution_user_id"
      expression: "lit('databricks_service')"
      datatype: "STRING"
    - name: "_environment_id"
      expression: "lit('prod')"
      datatype: "STRING"
    - name: "_cluster_id"
      expression: "lit('cluster_id_placeholder')"
      datatype: "STRING"
    - name: "_processing_library_version"
      expression: "lit('3.3.0')"
      datatype: "STRING"
    - name: "_operation_type"
      expression: "lit('INSERT')"
      datatype: "STRING"
    - name: "_retention_ttl"
      expression: "lit('14')"
      datatype: "STRING"
    - name: "forecast_date"
      expression: "col('forecast_timestamp').cast(DateType())"
      datatype: "DATE"

  watermarking:
    enabled: true
    event_time_column: "forecast_timestamp"
    delayed_threshold_minutes: 30
    allowed_lateness_minutes: 5
    max_state_bytes: 1000000000
    checkpoint_interval_minutes: 5
    state_location: "abfss://checkpoints@stfarmia.dfs.core.windows.net/weather/watermark"

sink:
  format: "delta"
  mode: "append"
  table_name: "silver.weather_external"
  partition_by: ["city", "forecast_date"]
  lifecycle:
    ttl: "14"
    sync_window: "D-1"
    pre_aggregation:
      enabled: true
      trigger_days_before_ttl: 1
      aggregations:
        - metric: "temperature"
          operations: ["min", "max", "avg"]
          frequency: "daily"
          output_table: "silver.weather_daily_agg"
        - metric: "humidity"
          operations: ["min", "max", "avg"]
          frequency: "daily"
    optimization:
      z_order_by: ["forecast_date", "city"]
      vacuum_days: 7

dlq:
  late_data:
    enabled: true
    max_delay_minutes: 30
    table_name: "bronze.weather_late_data"
    storage_days: 14
  
  retry_policy:
    strategy: "exponential_backoff"
    max_retries: 3
  
  circuit_breaker:
    max_error_percentage: 5
    action: "degrade_mode"
    alert_threshold_minutes: 10
    degradation_duration_minutes: 30
    auto_recover: true
  
  exception_masking:
    enabled: true
    silence_expires_hours: 4
    alert_logs_table: "system.alert_logs"
  
  watchdog:
    enabled: true
    max_execution_minutes: 45
    check_interval_seconds: 30
    alert_action: "warn_no_fail"

