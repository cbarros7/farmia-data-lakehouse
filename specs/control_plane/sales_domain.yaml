pipeline_info:
  domain: "sales_online"
  subdomain: "e_commerce"
  version: "1.0.0"
  owner: "data-platform"
  description: "Transacciones de la plataforma de comercio electrónico"

checkpoint_location: "abfss://checkpoints@stfarmia.dfs.core.windows.net/sales/transactions/"

source:
  type: "auto_loader"
  format: "parquet"
  path: "abfss://landing@stfarmia.dfs.core.windows.net/sales/transactions/"
  options:
    cloudFiles.format: "parquet"
    cloudFiles.useIncrementalListing: "true"
    cloudFiles.schemaEvolutionMode: "none"
    cloudFiles.rescuedDataColumn: "_rescued_data"
    cloudFiles.maxBytesPerTrigger: "134217728"
    cloudFiles.inferColumnTypes: "false"

schema_validation:
  schema_evolution_mode: "none"
  rescued_data_column: "_rescued_data"
  business_rules:
    - name: "positive_amount"
      condition: "amount > 0"
      action: "QUARANTINE"
      reason: "invalid_amount"
    - name: "valid_customer"
      condition: "customer_id IS NOT NULL"
      action: "QUARANTINE"
      reason: "missing_customer"
  fields:
    - name: "transaction_id"
      type: "StringType"
      nullable: false
    - name: "customer_id"
      type: "StringType"
      nullable: false
    - name: "product_id"
      type: "StringType"
      nullable: false
    - name: "amount"
      type: "DoubleType"
      nullable: false
    - name: "quantity"
      type: "IntegerType"
      nullable: false
    - name: "currency"
      type: "StringType"
      nullable: false
    - name: "transaction_timestamp"
      type: "TimestampType"
      nullable: false
    - name: "transaction_date"
      type: "DateType"
      nullable: false

transformations:
  pattern: "metadata_injection"
  # spark_memory_config:
  #  spark.executor.memory: "8g"
  #  spark.memory.fraction: "0.6"
  #  spark.memory.storageFraction: "0.4"

  metadata_injection:
    - name: "_batch_id"
      expression: "lit(batch_id)"
      datatype: "BIGINT"
    - name: "_ingest_timestamp"
      expression: "current_timestamp()"
      datatype: "TIMESTAMP"
    - name: "_event_timestamp"
      expression: "col('transaction_timestamp')"
      datatype: "TIMESTAMP"
    - name: "_schema_version_id"
      expression: "lit('1.0.0')"
      datatype: "STRING"
    - name: "_pipeline_git_hash"
      expression: "lit('placeholder_hash')"
      datatype: "STRING"
    - name: "_source_system"
      expression: "lit('sales_online')"
      datatype: "STRING"
    - name: "_file_path"
      expression: "lit('abfss://landing@stfarmia.dfs.core.windows.net/sales/transactions/')"
      datatype: "STRING"
    - name: "_execution_user_id"
      expression: "lit('databricks_service')"
      datatype: "STRING"
    - name: "_environment_id"
      expression: "lit('prod')"
      datatype: "STRING"
    - name: "_cluster_id"
      expression: "lit('cluster_id_placeholder')"
      datatype: "STRING"
    - name: "_processing_library_version"
      expression: "lit('3.3.0')"
      datatype: "STRING"
    - name: "_operation_type"
      expression: "lit('MERGE')"
      datatype: "STRING"
    - name: "_retention_ttl"
      expression: "lit('indefinite')"
      datatype: "STRING"
    - name: "transaction_date"
      expression: "col('transaction_timestamp').cast(DateType())"
      datatype: "DATE"

sink:
  format: "delta"
  mode: "merge_into"
  table_name: "silver.sales_online"
  merge_keys: ["transaction_id"]
  partition_by: ["transaction_date"]
  options:
    delta.enableIcebergCompatV2: "true"
    delta.universalFormat.enabledFormats: "iceberg"
  lifecycle:
    sync_window: "D-1"
  optimization:
    z_order_by: ["transaction_date", "customer_id"]
    vacuum_days: 30

dlq:
  quarantine_table: "bronze.sales_quarantine"
  late_data:
    enabled: false

  circuit_breaker:
    max_error_percentage: 2
    action: "degrade_mode"
    alert_threshold_minutes: 10
    degradation_duration_minutes: 30
    auto_recover: true

  retry_policy:
    strategy: "exponential_backoff"
    max_retries: 4
    initial_interval_seconds: 2
    max_interval_seconds: 60
    multiplier: 2.0
    jitter_enabled: true

  exception_masking:
    enabled: true
    persistence_table: "system.alert_logs"
    silence_duration_hours: 4
    alert_threshold_count: 5

  watchdog:
    enabled: true
    max_execution_minutes: 45
    check_interval_seconds: 30
    alert_action: "warn_no_fail"

tables_config:
  tables:
    - name: "bronze.sales_online"
      layer: "bronze"
      columns:
        - name: "_file_path"
          type: "STRING"
          nullable: false
        - name: "_ingest_timestamp"
          type: "TIMESTAMP"
          nullable: false
        - name: "transaction_id"
          type: "STRING"
          nullable: false
        - name: "customer_id"
          type: "STRING"
          nullable: false
        - name: "product_id"
          type: "STRING"
          nullable: false
        - name: "amount"
          type: "DOUBLE"
          nullable: false
        - name: "quantity"
          type: "INT"
          nullable: false
        - name: "currency"
          type: "STRING"
          nullable: false
        - name: "transaction_timestamp"
          type: "TIMESTAMP"
          nullable: false
        - name: "transaction_date"
          type: "DATE"
          nullable: false
        - name: "_rescued_data"
          type: "STRING"
          nullable: true
      partition_by: ["transaction_date"]

    - name: "silver.sales_online"
      layer: "silver"
      columns:
        - name: "_batch_id"
          type: "BIGINT"
          nullable: false
        - name: "_ingest_timestamp"
          type: "TIMESTAMP"
          nullable: false
        - name: "_event_timestamp"
          type: "TIMESTAMP"
          nullable: false
        - name: "_schema_version_id"
          type: "STRING"
          nullable: false
        - name: "_pipeline_git_hash"
          type: "STRING"
          nullable: false
        - name: "_source_system"
          type: "STRING"
          nullable: false
        - name: "_file_path"
          type: "STRING"
